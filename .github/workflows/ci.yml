name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Node.js (v18)
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        cd service1
        npm install

    # 4️⃣ Build Docker image
    - name: Build Docker image
      run: |
        docker build -t service1 ./service1

    # 5️⃣ Trivy scan for security
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: service1

    # 6️⃣ SonarCloud scan (updated action)
    - name: SonarCloud Scan
      uses: sonarsource/sonarcloud-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
