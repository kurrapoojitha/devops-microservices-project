name: Cost-Free DevOps CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-free:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js environment (for tests or scripts)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # 3️⃣ Install dependencies (if your project has package.json)
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      # 4️⃣ Run unit tests (if any)
      - name: Run unit tests
        run: |
          if [ -f package.json ]; then
            npm test || echo "Unit tests failed, but continuing"
          else
            echo "No tests found, skipping"
          fi

      # 5️⃣ Static code analysis with SonarCloud
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v1
        with:
          projectKey: YOUR_PROJECT_KEY
          organization: YOUR_ORG_NAME
          token: ${{ secrets.SONAR_TOKEN }}

      # 6️⃣ Security scan with Trivy (local code scan, no Docker needed)
      - name: Trivy code scan
        uses: aquasecurity/trivy-action@main
        with:
          scan-type: fs
          path: .
          format: table
          exit-code: 1
          ignore-unfixed: true
