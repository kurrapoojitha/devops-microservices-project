name: DevOps CI Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install || echo "Skipping npm install if not needed"

      - name: Run unit tests
        run: npm test || echo "Skipping tests if not configured"

      - name: Build Docker image
        run: docker build -t my-microservice:latest . || echo "Skipping Docker build"

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@main
        with:
          image-ref: my-microservice:latest
          format: table
          exit-code: 1
          ignore-unfixed: true

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v1
        with:
          projectKey: YOUR_PROJECT_KEY
          organization: YOUR_ORG_NAME
          token: ${{ secrets.SONAR_TOKEN }}
